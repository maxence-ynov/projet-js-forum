{{define "page"}}
<div class="card auth-card">
    <h2>Connexion</h2>
    
    <form method="POST" action="/login">
        <div class="form-group">
            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" name="username" value="{{index .FormValues "username"}}" required maxlength="30">
        </div>
        
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required maxlength="72">
        </div>
        
        <button type="submit">Se connecter</button>
        
        <p class="mt-2">
            Pas encore inscrit ? <a href="/register">Créer un compte ici</a>
        </p>
    </form>
</div>
{{end}}
